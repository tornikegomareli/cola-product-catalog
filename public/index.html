<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Catalog - Labeling Reference</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f0f3f6;
      margin-bottom: 4px;
    }

    .header .subtitle {
      font-size: 13px;
      color: #8b949e;
    }

    .stats {
      display: inline-flex;
      gap: 16px;
      margin-top: 12px;
      font-size: 13px;
      color: #8b949e;
    }

    .stats span {
      background: #21262d;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #30363d;
    }

    .stats .count {
      color: #58a6ff;
      font-weight: 600;
    }

    /* Search */
    .search-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 24px;
    }

    .search-wrapper {
      position: relative;
      max-width: 560px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #8b949e;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      font-size: 15px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e1e4e8;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder {
      color: #6e7681;
    }

    .search-input:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: #30363d;
      border: none;
      color: #8b949e;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
    }

    .clear-btn:hover {
      background: #484f58;
      color: #e1e4e8;
    }

    .clear-btn.visible {
      display: flex;
    }

    /* Grid */
    .grid {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    /* Card */
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
    }

    .card:hover {
      border-color: #58a6ff;
      transform: translateY(-2px);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background: #fff;
      padding: 12px;
      display: block;
    }

    .card-body {
      padding: 12px 14px;
      border-top: 1px solid #30363d;
    }

    .card-name {
      font-size: 13px;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      color: #c9d1d9;
      word-break: break-all;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
      justify-content: center;
    }

    .copy-btn:hover {
      background: #2ea043;
    }

    .copy-btn:active {
      background: #238636;
      transform: scale(0.98);
    }

    .copy-btn.copied {
      background: #1f6feb;
      border-color: #388bfd;
    }

    .copy-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* Empty state */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
    }

    .empty svg {
      width: 48px;
      height: 48px;
      color: #484f58;
      margin-bottom: 16px;
    }

    .empty h3 {
      font-size: 18px;
      color: #8b949e;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .empty p {
      font-size: 14px;
      color: #6e7681;
    }

    /* Loading */
    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: #8b949e;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1f6feb;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 200;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
      }
      .header h1 {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-inner">
      <h1>Product Catalog</h1>
      <div class="subtitle">Labeling Reference Guide</div>
      <div class="stats">
        <span>Total: <span class="count" id="totalCount">-</span></span>
        <span>Showing: <span class="count" id="showingCount">-</span></span>
      </div>
    </div>
  </div>

  <div class="search-container">
    <div class="search-wrapper">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M11.5 7a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm-.82 4.74a6 6 0 1 1 1.06-1.06l3.04 3.04a.75.75 0 1 1-1.06 1.06l-3.04-3.04Z"/>
      </svg>
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="Search products... (e.g. cocacola, fanta, 0_5L)"
        autocomplete="off"
      >
      <button class="clear-btn" id="clearBtn" title="Clear search">&times;</button>
    </div>
  </div>

  <div class="grid" id="productGrid">
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading products...</div>
    </div>
  </div>

  <div class="toast" id="toast">Copied to clipboard!</div>

  <script>
    const grid = document.getElementById('productGrid');
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const totalCount = document.getElementById('totalCount');
    const showingCount = document.getElementById('showingCount');
    const toast = document.getElementById('toast');

    let allProducts = [];
    let toastTimeout = null;

    // SVG icons
    const copyIcon = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>`;
    const checkIcon = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>`;

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('show');
      if (toastTimeout) clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    async function copyToClipboard(name, btn) {
      try {
        await navigator.clipboard.writeText(name);
        btn.innerHTML = `${checkIcon} Copied!`;
        btn.classList.add('copied');
        showToast(`Copied: ${name}`);
        setTimeout(() => {
          btn.innerHTML = `${copyIcon} Copy Name`;
          btn.classList.remove('copied');
        }, 2000);
      } catch (err) {
        // Fallback for non-HTTPS contexts
        const ta = document.createElement('textarea');
        ta.value = name;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.innerHTML = `${checkIcon} Copied!`;
        btn.classList.add('copied');
        showToast(`Copied: ${name}`);
        setTimeout(() => {
          btn.innerHTML = `${copyIcon} Copy Name`;
          btn.classList.remove('copied');
        }, 2000);
      }
    }

    function createCard(product) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.name = product.name.toLowerCase();

      card.innerHTML = `
        <img
          class="card-image"
          src="/images/${encodeURIComponent(product.filename)}"
          alt="${product.name}"
          loading="lazy"
        >
        <div class="card-body">
          <div class="card-name">${product.name}</div>
          <button class="copy-btn" title="Copy product name to clipboard">
            ${copyIcon} Copy Name
          </button>
        </div>
      `;

      const btn = card.querySelector('.copy-btn');
      btn.addEventListener('click', () => copyToClipboard(product.name, btn));

      return card;
    }

    function renderProducts(products) {
      grid.innerHTML = '';
      showingCount.textContent = products.length;

      if (products.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            <svg viewBox="0 0 16 16" fill="currentColor">
              <path d="M11.5 7a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm-.82 4.74a6 6 0 1 1 1.06-1.06l3.04 3.04a.75.75 0 1 1-1.06 1.06l-3.04-3.04Z"/>
            </svg>
            <h3>No products found</h3>
            <p>Try a different search term</p>
          </div>
        `;
        return;
      }

      const fragment = document.createDocumentFragment();
      products.forEach(p => fragment.appendChild(createCard(p)));
      grid.appendChild(fragment);
    }

    function filterProducts(query) {
      const q = query.toLowerCase().trim();
      if (!q) {
        renderProducts(allProducts);
        return;
      }
      const terms = q.split(/\s+/);
      const filtered = allProducts.filter(p => {
        const name = p.name.toLowerCase();
        return terms.every(t => name.includes(t));
      });
      renderProducts(filtered);
    }

    // Search handlers
    searchInput.addEventListener('input', () => {
      const val = searchInput.value;
      clearBtn.classList.toggle('visible', val.length > 0);
      filterProducts(val);
    });

    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearBtn.classList.remove('visible');
      filterProducts('');
      searchInput.focus();
    });

    // Keyboard shortcut: "/" to focus search
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== searchInput) {
        e.preventDefault();
        searchInput.focus();
      }
      if (e.key === 'Escape' && document.activeElement === searchInput) {
        searchInput.blur();
      }
    });

    // Load products
    async function init() {
      try {
        const res = await fetch('/api/products');
        const data = await res.json();
        allProducts = data.products;
        totalCount.textContent = data.total;
        renderProducts(allProducts);
      } catch (err) {
        grid.innerHTML = `
          <div class="empty">
            <h3>Failed to load products</h3>
            <p>${err.message}</p>
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
